{% extends 'base.html' %}
{% block title %}{{ title }} — HRMIS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-briefcase text-info"></i> {{ title }}</h4>
  <a href="{% url 'job_list' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-body p-4">
    <form method="post" novalidate>
      {% csrf_token %}

      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% for error in field.errors %}
            <div class="text-danger small">{{ error }}</div>
          {% endfor %}
        </div>
      {% endfor %}

      <div class="d-flex gap-2 mt-2">
        <button type="submit" class="btn btn-info text-white">
          <i class="bi bi-check-lg"></i> Save Job Posting
        </button>
        <a href="{% url 'job_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
