{% extends 'base.html' %}
{% block title %}Confirm Delete — HRMIS{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <i class="bi bi-exclamation-triangle-fill"></i> Confirm Delete
      </div>
      <div class="card-body text-center py-4">
        <p class="fs-5 mb-1">Are you sure you want to delete</p>
        <p class="fw-bold fs-4 text-danger">{{ obj }}</p>
        <p class="text-muted small">This action cannot be undone.</p>

        <form method="post" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash"></i> Yes, Delete
          </button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
