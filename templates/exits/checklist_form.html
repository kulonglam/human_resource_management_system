{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1>Add Checklist Item</h1>
            <p class="text-muted">Exit Process for {{ exit_process.employee.first_name }} {{ exit_process.employee.last_name }}</p>
            <a href="{% url 'exits:detail' exit_process.id %}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to Exit Details
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Checklist Item</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-plus-circle"></i> Add Item
                            </button>
                            <a href="{% url 'exits:detail' exit_process.id %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
